$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

# Window modification
bind = $mainMod, C, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod, F11, fullscreen
bind = $mainMod, P, pseudo, # dwindle

# Software execution
bind = $mainMod, Q, exec, $terminal 
bind = $mainMod, E, exec, $file_explorer
bind = $mainMod, D, exec, $discord
bind = $mainMod, O, exec, $notes
bind = $mainMod, Z, exec, $browser
bind = $mainMod, W, exec, $restart_modules

# Menus and Modes
bind = $mainMod+SHIFT, N, exec, $notification_center
bind = $mainMod+SHIFT, D, exec, $menu
bind = $mainMod+SHIFT, P, exec, $pass_menu
bind = $mainMod+SHIFT, M, exec, $logout_menu
bind = $mainMod+SHIFT, C, exec, $clipboard_menu
bind = $mainMod+SHIFT, F8, exec, [float] $scrcpy_menu
bind = $mainMod+SHIFT, Z, exec, $zen_mode_toggle 

# Focus movement
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switching workspaces
## especific
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

## relative
bind = $mainMod CTRL, H, workspace, e-1
bind = $mainMod CTRL, L, workspace, e+1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Moving windows around visible workspaces
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# Moving windows to a specific workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad workspace
bind = $mainMod, S, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, S, movetoworkspace, special:scratchpad

# Moving/resizing windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

binde = $mainMod+ALT, H, resizeactive, -5 0
binde = $mainMod+ALT, J, resizeactive, 0 5
binde = $mainMod+ALT, K, resizeactive, 0 -5
binde = $mainMod+ALT, L, resizeactive, 5 0

# Brightness control
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-
# bindel = SHIFT,XF86MonBrightnessUp, exec, brightnessctl --device=asus_screenpad s 5%+
# bindel = SHIFT,XF86MonBrightnessDown, exec, brightnessctl --device=asus_screenpad s 5%-

# Toggle Touchpad
bindel = , F6, exec, ~/.scripts/touchpad_toggle.sh

# Media control
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bindel = ,XF86AudioRaiseVolume, exec, ~/.scripts/volume_control.sh "up" 5%
bindel = ,XF86AudioLowerVolume, exec, ~/.scripts/volume_control.sh "down" 5%
bindel = ,XF86AudioMute, exec, ~/.scripts/volume_control.sh "toggle-mute"

bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Zoom
bind = $mainMod+Ctrl, Plus, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}") # Zoom out
bind = $mainMod+Ctrl, Minus, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}") # Zoom in

# Toggle Hypridle
bind = , F10, exec, ~/.scripts/hypridle_toggle.sh

# Hyprsunset
bind = , F12, exec, ~/.scripts/red_filter.sh 4000
bind = Ctrl , F12, exec, ~/.scripts/red_filter.sh 3000

# Screenshoting
bindel = , print, exec, hyprshot -m window -o ~/Pictures/Screenshots/
bindel = SHIFT, print, exec, hyprshot -m region ~/Pictures/Screenshots/
bindel = $mainMod, print, exec, hyprshot -m output ~/Pictures/Screenshots/
